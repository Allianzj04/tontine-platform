<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Details du groupe</title>
</head>
<body>
  <h3>Membres du groupe</h3>
  {% for membre, cotisation in cotisation_membre %}
    <ul>
      <li>
        {{ membre }} : {{ cotisation.statut }}
        {% if cotisation.statut == 'non_paye' %}
          <form method="POST" action="">
            {% csrf_token %}
            <button type="submit">Marquer comme payé</button>
            <input type="hidden" name="cotisation_id" value="{{ cotisation.id }}">
          </form>
        {% endif %}
      </li>
    </ul>
  {% endfor %}
  {% if cycle %}
    <h3>Cycle en cours: {{ cycle.date_debut }}</h3>
  {% endif %}
</body>
</html>
