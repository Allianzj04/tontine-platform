<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tontine-Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  
  <h1 class="mb-4">Tontine-Platform</h1>

  <div id="login-section">
    <h2>Login</h2>
    <input type="text" id="username" class="form-control mb-2" placeholder="Username">
    <input type="password" id="password" class="form-control mb-2" placeholder="Password">
    <button onclick="login()" class="btn btn-primary">Login</button>
    <p id="login-error" class="text-danger mt-2"></p>
  </div>

  <div id="members-section" style="display: none;">
    <h2 class="mt-4">Members</h2>
    <ul id="members-list" class="list-group"></ul>
  </div>

  <script>
    let token = null;

    async function login() {
      username = document.getElementById("username").value;
      password = document.getElementById("password").value;
      
      const response = await fetch("http://127.0.0.1:8001/login", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `username=${username}&password=${password}`
      }
      )
      const data = await response.json();

      if(response.ok) {
        token = data.access_token;
        getMembers();

      } else {
        document.getElementById("login-error").innerHTML = "login error"
      }
    }
    async function getMembers() {
      const response = await fetch("http://127.0.0.1:8001/members", {
        method: "GET",
        headers: {"Authorization": "Bearer " + token},
      })

      data = await response.json();
      const list = document.getElementById("members-list");
      data.members.forEach(member => {
        list.innerHTML += `<li class="list-group-item">${member.first_name} ${member.last_name}</li>`;
      });
      document.getElementById("login-section").style.display = "none";
      document.getElementById("members-section").style.display = "block";

    }
  </script>

</body>
</html>
